name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    name: Build + test (no native deps)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      # No native deps installed deliberately. `lp-tactic` is pure
      # Lean; if anything in this build graph ever pulls GMP, Boost,
      # or SoPlex, we want to know immediately.
      - run: lean --version
      - run: lake build
      - run: lake test
